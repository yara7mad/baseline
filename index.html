<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Baseline — PV Design Review</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root { --primary-blue: #0d6efd; --slate-700: #334155; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #f8f9fa; }
    .metric { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.025em; color: #64748b; font-weight: 600; }
    .metric-value { font-size: 1.25rem; font-weight: 700; color: #1e293b; }
    .card { border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); }
    .nav-tabs .nav-link { color: #64748b; font-weight: 500; border: none; padding: 1rem 1.25rem; }
    .nav-tabs .nav-link.active { color: var(--primary-blue); border-bottom: 3px solid var(--primary-blue); background: none; }
    pre { border-radius: 8px; font-size: 0.875rem; color: #334155; max-height: 400px; overflow-y: auto; }
    .header-img { width:100%; height:180px; object-fit:cover; border-radius:12px; }
  </style>
</head>

<body>
  <div class="container py-4">
    <div class="mb-4">
      <img src="assets/header-strip.png" alt="Infrastructure Visualization" class="header-img">
    </div>

    <div class="d-flex align-items-center justify-content-between mb-4 bg-white p-4 rounded-3 shadow-sm border">
      <div class="d-flex align-items-center">
        <img src="assets/idea-logo.png" alt="Baseline Logo" style="height:60px; width:auto;">
      </div>

      <div class="text-center px-3">
        <h1 class="fw-bold mb-1" style="font-size:1.75rem; color: #0f172a;">AI-Powered Review. Engineer-Verified.</h1>
        <p class="text-muted mb-0">Automated structural verification and PV design analysis.</p>
      </div>

      <div class="d-flex align-items-center gap-3">
        <img src="assets/company-logo.png" alt="Partner Logo" style="height:50px; width:auto;">
        <button id="runBtn" class="btn btn-primary px-4 fw-bold shadow-sm">Run Review</button>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label fw-semibold">Project Name</label>
            <input id="projectNameInput" class="form-control" placeholder="System 1 – Rooftop PV">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Company / Client</label>
            <input id="companyNameInput" class="form-control" placeholder="Desert Technologies">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Design Package (PDF)</label>
            <input id="files" type="file" class="form-control" accept="application/pdf">
          </div>
        </div>
      </div>
    </div>

    <ul class="nav nav-tabs mb-0" role="tablist">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabDashboard" type="button">Dashboard</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabIssues" type="button">Issues (NCR)</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabRaw" type="button">Raw Logic</button>
      </li>
    </ul>

    <div class="tab-content border border-top-0 bg-white p-4 shadow-sm rounded-bottom-3">
      <div class="tab-pane fade show active" id="tabDashboard">
        <div class="row g-4 text-center">
          <div class="col-md-3">
            <div class="metric">DC Capacity</div>
            <div id="dashDc" class="metric-value">--</div>
          </div>
          <div class="col-md-3">
            <div class="metric">AC Capacity</div>
            <div id="dashAc" class="metric-value">--</div>
          </div>
          <div class="col-md-3">
            <div class="metric">Inverter Count</div>
            <div id="dashInvCount" class="metric-value">--</div>
          </div>
          <div class="col-md-3">
            <div class="metric">Module Count</div>
            <div id="dashModCount" class="metric-value">--</div>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="tabIssues">
        <div id="issuesTable" class="table-responsive">
            <p class="text-muted text-center py-4">Run a review to see identified technical issues.</p>
        </div>
      </div>

      <div class="tab-pane fade" id="tabRaw">
        <h6 class="fw-bold">AI Analysis Prompt Output</h6>
        <pre id="rawOutput" class="bg-light p-3 border">System idle. Waiting for design package...</pre>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const runBtn = document.getElementById('runBtn');
    
    runBtn.onclick = async function() {
        const files = document.getElementById('files').files;
        if (!files.length) return alert("Please upload a PDF first.");

        runBtn.disabled = true;
        runBtn.textContent = "Analyzing...";
        document.getElementById('rawOutput').textContent = "Processing PDF and contacting Groq AI...";

        const fd = new FormData();
        fd.append("projectName", document.getElementById('projectNameInput').value);
        fd.append("company", document.getElementById('companyNameInput').value);
        fd.append("file", files[0]);

        try {
            // Using relative path to match the same server origin
            const res = await fetch('/generate-review', {
                method: "POST",
                body: fd
            });

            if (!res.ok) {
                const errorText = await res.text();
                throw new Error(errorText || "Server failed to respond.");
            }

            const data = await res.json();
            console.log("Success:", data);

            // Update Dashboard Metrics
            if (data.dashboard) {
                document.getElementById('dashDc').textContent = (data.dashboard.dcKwp || "N/A") + " kWp";
                document.getElementById('dashAc').textContent = (data.dashboard.acKw || "N/A") + " kW";
                document.getElementById('dashInvCount').textContent = data.dashboard.inverterCount || "N/A";
                document.getElementById('dashModCount').textContent = data.dashboard.moduleCount || "N/A";
            }

            // Update Issues Table
            if (data.issues && data.issues.length > 0) {
                let html = '<table class="table table-hover border"><thead><tr><th>ID</th><th>Category</th><th>Severity</th><th>Description</th></tr></thead><tbody>';
                data.issues.forEach(issue => {
                    html += `<tr><td>${issue.ID}</td><td>${issue.Category}</td><td><span class="badge ${issue.Severity === 'Major' ? 'bg-danger' : 'bg-warning'}">${issue.Severity}</span></td><td>${issue.Description}</td></tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('issuesTable').innerHTML = html;
            }

            // Update Raw Log
            document.getElementById('rawOutput').textContent = JSON.stringify(data, null, 2);
            
            alert("Analysis Successfully Completed!");

        } catch (e) {
            console.error("Frontend Error:", e);
            alert("The review process encountered an error. Check the terminal for 'Backend Error'.");
            document.getElementById('rawOutput').textContent = "Error: " + e.message;
        } finally {
            runBtn.disabled = false;
            runBtn.textContent = "Run Review";
        }
    };
  </script>
</body>
</html>
